  <h1><b>ybelik</b> CodePens &#183; Prefill launchers</h1>
  <p class="note">Each button POSTs to <code>codepen.io/pen/define</code> and opens a
  <b>prefilled, unsaved</b> pen in a new tab. <b>Saving is Asaf's step</b> (it writes to the
  account) — open, eyeball, then Save under your login. Packages load from unpkg; scenes from jsDelivr.</p>
    <form action="https://codepen.io/pen/define" method="POST" target="_blank">
      <input type="hidden" name="data" value="{&quot;title&quot;: &quot;ybelik \u00b7 scene-compiler live compile&quot;, &quot;description&quot;: &quot;From the ybelik story engine monorepo. Packages from unpkg (pinned).&quot;, &quot;tags&quot;: [&quot;ybelik&quot;, &quot;svg&quot;, &quot;animation&quot;, &quot;ink-wash&quot;, &quot;compiler&quot;, &quot;generative&quot;], &quot;editors&quot;: &quot;011&quot;, &quot;html&quot;: &quot;&lt;header&gt;\n    &lt;h1&gt;&lt;b&gt;@ybelik/scene-compiler&lt;/b&gt; \u00b7 live compile + reveal&lt;/h1&gt;\n    &lt;p class=\&quot;sub\&quot;&gt;A traced SVG, sorted by luminance and assigned &lt;code&gt;class=\&quot;rp bN\&quot;&lt;/code&gt; buckets\n    (N = 0..99), then painted light-to-dark by &lt;code&gt;@ybelik/reveal-engine&lt;/code&gt;.\n    &lt;b&gt;Every knob below recompiles the SVG in your browser&lt;/b&gt; \u2014 this is the compile-time\n    interactivity the JS port exists for.\n    &lt;span class=\&quot;hostile\&quot; id=\&quot;hostile\&quot;&gt;group-inherited styles &amp;#8594; luminance ties &amp;#8594;\n    draw-order reveal; &lt;code&gt;auditMetrics&lt;/code&gt; catches it (attr-fb 85.6%). Labels are\n    &lt;code&gt;&amp;lt;text&amp;gt;&lt;/code&gt;, not paths &amp;#8212; never bucketed.&lt;/span&gt;&lt;/p&gt;\n  &lt;/header&gt;\n\n  &lt;div class=\&quot;stage\&quot; id=\&quot;stage\&quot;&gt;&lt;/div&gt;\n\n  &lt;div class=\&quot;controls\&quot;&gt;\n    &lt;label&gt;scene\n      &lt;select id=\&quot;asset\&quot;&gt;\n        &lt;option value=\&quot;bird\&quot;&gt;ink-wash bird &amp;#8212; traced, 1825 paths&lt;/option&gt;\n        &lt;option value=\&quot;xray\&quot;&gt;hostile: X-29 line art &amp;#8212; NASA, public domain, group-styled&lt;/option&gt;\n      &lt;/select&gt;\n    &lt;/label&gt;\n    &lt;label&gt;direction\n      &lt;select id=\&quot;direction\&quot;&gt;\n        &lt;option value=\&quot;light-to-dark\&quot;&gt;light &amp;#8594; dark&lt;/option&gt;\n        &lt;option value=\&quot;dark-to-light\&quot;&gt;dark &amp;#8594; light&lt;/option&gt;\n      &lt;/select&gt;\n    &lt;/label&gt;\n    &lt;label&gt;jitter &lt;input type=\&quot;range\&quot; id=\&quot;jitter\&quot; min=\&quot;0\&quot; max=\&quot;20\&quot; value=\&quot;0\&quot;&gt;&lt;span id=\&quot;jitterVal\&quot;&gt;0&lt;/span&gt;&lt;/label&gt;\n    &lt;label&gt;seed &lt;input type=\&quot;number\&quot; id=\&quot;seed\&quot; value=\&quot;42\&quot;&gt;&lt;/label&gt;\n    &lt;button id=\&quot;replay\&quot;&gt;recompile + replay&lt;/button&gt;\n    &lt;div class=\&quot;readout\&quot; id=\&quot;readout\&quot;&gt;&amp;#8212;&lt;/div&gt;\n  &lt;/div&gt;\n\n  &lt;!-- hostile input inlined so the pen is self-contained; the bird is fetched from the pinned CDN --&gt;\n  &lt;script type=\&quot;text/plain\&quot; id=\&quot;raw-xray\&quot;&gt;&lt;?xml version=\&quot;1.0\&quot; standalone=\&quot;no\&quot;?&gt;\n&lt;svg width=\&quot;696px\&quot; height=\&quot;322px\&quot; viewBox=\&quot;-67 257 696 322\&quot; xmlns=\&quot;http://www.w3.org/2000/svg\&quot; xmlns:xlink=\&quot;http://www.w3.org/1999/xlink\&quot;&gt;\n&lt;g style=\&quot;fill:none;stroke:#000000;stroke-miterlimit:4\&quot;&gt;\n&lt;g stroke-width=\&quot;0.75\&quot; stroke-dasharray=\&quot;105,2,5,2,5,2\&quot; stroke-dashoffset=\&quot;25\&quot;&gt;\n&lt;path d=\&quot;M 243.781 573.637 L 623.965 573.637\&quot;/&gt;\n&lt;/g&gt;\n&lt;g stroke-width=\&quot;0.8\&quot;&gt;\n&lt;path d=\&quot;M 226.113 371 L 226.113 537.582\&quot;/&gt;\n&lt;path d=\&quot;M 564.355 475.086 L 624.621 475.086\&quot;/&gt;\n&lt;path d=\&quot;M 600.93 480.359 L 600.93 510 M 600.93 540 L 600.93 570.297\&quot;/&gt;\n&lt;path d=\&quot;M 562.926 374.668 L 562.926 471.961\&quot;/&gt;\n&lt;/g&gt;\n&lt;g stroke-width=\&quot;1\&quot;&gt;\n&lt;path d=\&quot;M 225.652 356.871 C 241.098 345.422 298.867 345.687 298.867 345.687 L 350.254 345.687 L 350.254 343.824 L 339.07 343.824 L 345.727 342.227 C 345.727 342.227 345.461 338.766 345.727 336.902 C 345.996 335.039 346.527 335.574 346.527 335.574 C 346
