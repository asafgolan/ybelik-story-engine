  <!-- the module stack: theme values first, then structure -->
  <link rel="stylesheet" href="theme-yael.css" />
  <link rel="stylesheet" href="scene-player.css" />

  <style>
    /* Page styles only. Panels, captions, the .rp reveal rule and the
       paper vignette live in scene-player.css; palette + type tokens
       live in theme-yael.css. This block must come AFTER those links:
       .stage's position:sticky below must cascade over .sp-stage's
       position:relative. */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: var(--paper); }
    body {
      font-family: var(--sans);
      font-weight: 300;
      color: var(--ink);
      line-height: 1.7;
      overflow-x: hidden;
    }
    ::selection { background: var(--ink); color: var(--paper); }

    /* ─── intro ──────────────────────────────────────────── */
    .intro {
      min-height: 100vh;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center; text-align: center;
      padding: 4rem 2rem;
    }
    .intro .eyebrow {
      font-family: var(--latin); font-style: italic;
      color: var(--ochre); font-size: 1.1rem;
      letter-spacing: 0.15em; margin-bottom: 1.5rem;
    }
    .intro h1 {
      font-family: var(--serif); font-weight: 500;
      font-size: clamp(2.5rem, 7vw, 5rem); line-height: 1.1;
      margin-bottom: 1.5rem; letter-spacing: -0.01em;
    }
    .intro h1 em {
      display: block; font-family: var(--latin); font-style: italic;
      font-weight: 400; color: var(--ochre);
      font-size: 0.45em; letter-spacing: 0.04em; margin-top: 1rem;
    }
    .intro p { max-width: 36ch; font-size: 1.1rem; color: var(--ink-soft); }
    .scroll-cue {
      margin-top: 4rem; font-family: var(--latin); font-style: italic;
      color: var(--ink-soft); font-size: 0.95rem; letter-spacing: 0.2em;
      animation: breathe 3s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { opacity: 0.4; transform: translateY(0); }
      50%      { opacity: 0.8; transform: translateY(8px); }
    }

    /* ─── scroll story (stage structure comes from .sp-stage) ─── */
    .story { position: relative; height: 100vh; }
    .stage {
      position: sticky; top: 0;
      width: 100%; height: 100vh;
    }

    /* progress dots */
    .progress {
      position: fixed; top: 50%; left: 1.5rem;
      transform: translateY(-50%);
      display: flex; flex-direction: column; gap: 0.85rem; z-index: 50;
      mix-blend-mode: multiply;
    }
    .progress span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--ink); opacity: 0.25;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .progress span.active { opacity: 1; transform: scale(1.4); }
    @media (max-width: 720px) {
      .progress { left: 0.75rem; gap: 0.6rem; }
      .progress span { width: 5px; height: 5px; }
    }

    /* loading veil */
    .loading-veil {
      position: fixed; inset: 0; z-index: 999;
      background: var(--paper);
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }
    .loading-veil.hidden { opacity: 0; }
    .loading-veil .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--ink); opacity: 0.3;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.2; transform: scale(0.9); }
      50%      { opacity: 0.7; transform: scale(1.1); }
    }

    @media (prefers-reduced-motion: reduce) {
      .progress span { transition: none; }
      .scroll-cue, .loading-veil .dot { animation: none; }
    }

    /* invitation */
    .invitation {
      min-height: 100vh;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center; text-align: center;
      padding: 4rem 2rem; gap: 2rem;
    }
    .invitation .eyebrow {
      font-family: var(--latin); font-style: italic;
      color: var(--ochre); letter-spacing: 0.15em;
    }
    .invitation h2 {
      font-family: var(--serif); font-weight: 500;
      font-size: clamp(2rem, 5vw, 3.2rem);
      max-width: 18ch; line-height: 1.2;
    }
    .invitation p {
      max-width: 40ch; color: var(--ink-soft); font-size: 1.1rem;
    }
    .cta {
      display: inline-flex; align-items: center; gap: 0.75rem;
      padding: 1.1rem 2.5rem; background: var(--ink); color: var(--paper);
      text-decoration: none; font-family: var(--serif);
      font-size: 1.05rem; letter-spacing: 0.02em;
      border: none; cursor: pointer;
      position: relative; overflow: hidden;
      transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .cta::before {
      content: ''; position: absolute; inset: 0;
      background: var(--indigo); transform: translateX(100%);
      transition: transform 0.5s cubic-bezier(0.7, 0, 0.3, 1); z-index: 0;
    }
    .cta:hover::before { transform: translateX(0); }
    .cta:hover { transform: translateY(-2px); }
    .cta span { position: relative; z-index: 1; }

    footer {
      padding: 3rem 2rem; text-align: center;
      border-top: 1px solid rgba(31, 27, 21, 0.08);
    }
    footer p {
      font-family: var(--latin); font-style: italic;
      color: var(--ink-soft); font-size: 0.95rem;
    }
    footer .social {
      display: flex; justify-content: center; gap: 1.6rem;
      margin-bottom: 1.4rem;
    }
    footer .social a {
      display: inline-flex; color: var(--ink-soft);
      transition: color 0.35s ease, transform 0.35s ease;
    }
    footer .social a:hover { color: var(--ochre); transform: translateY(-2px); }
    footer .social svg { width: 22px; height: 22px; fill: currentColor; }
  </style>

<body>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/ScrollTrigger.min.js"></script>
  <script src="reveal-engine.js"></script>
  <script src="scene-player.js"></script>
  <script src="navigation-shell.js"></script>

  <script>
    /* ─────────────────────────────────────────────────────────────
       Glue — the only page-specific code left. Wires the module
       stack: story.json → ScenePlayer (C) → navigation-shell (D),
       themed by theme-yael.css (E), painting via reveal-engine (B)
       over scenes compiled by compile_scene.py (A).

       Documented quirk access into C's PUBLIC surface (per DOD-D):
       · fadeOut(i)  — disengage fades the current panel + caption
         WITHOUT clearing and scrolls mid-fade (production behavior;
         hideScene would clear and wait 0.45s) → direct style writes
         on player.panels[i] / player.captions[i].
       · onDisengaged — production reset of the view cursor
         (state.i = -1, painted = false) → direct write on
         player.state. scene-player.js itself is untouched.
       Declared deviation: the veil lifts on player.ready (ALL scenes
       fetched) instead of first-scene-loaded.
       ───────────────────────────────────────────────────────────── */
    (async () => {
      const stage = document.getElementById('stage');
      const storySection = document.getElementById('story');

      const story = await fetch('story.json').then(r => {
        if (!r.ok) throw new Error('story.json ' + r.status);
        return r.json();
      });

      const dots = new ProgressDots(document.querySelector('.progress'),
                                    story.scenes.length);
      dots.setActive(0);   // production had dot 0 pre-active

      let engagement = null;   // assigned below; guarded in onBoundary

      const player = new ScenePlayer(stage, story, {
        onSceneChange: i => dots.setActive(i),
        onBoundary: dir => {
          if (!engagement) return;
          if (dir > 0) engagement.disengageForward();
          else engagement.disengageBackward();
        }
      });

      const N = player.length;
      const fadeOut = i => {                 // quirk: fade, no clear
        const cap = player.captions[i];
        if (cap) cap.style.opacity = '0';
        player.panels[i].style.opacity = '0';
      };

      // Production sequencing: navigation arms only after all scenes load.
      await player.ready;

      const veil = document.getElementById('loadingVeil');
      if (veil) {
        veil.classList.add('hidden');
        setTimeout(() => veil.remove(), 700);
      }

      engagement = new ScrollEngagement({
        trigger: storySection,
        exitSelector: 'section.invitation',
        seam: { entry: 800, exit: 600 },           // verbatim SEAM
        onEngage: () => player.goTo(0, { duration: 1.8 }),  // 1.8s entrance, paint at t=0
        onExitForward: () => fadeOut(N - 1),
        onExitBackward: () => fadeOut(0),
        onDisengaged: () => {
          player.state.i = -1;
          player.state.painted = false;
        }
      });

      new GestureNavigator({
        engagement,
        isBusy: () => player.state.busy,
        onStep: dir => (dir > 0 ? player.next() : player.prev())
      });
    })().catch(e => console.error('init failed:', e));
  </script>
